<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>demo Salon - Premium Shop</title>
  
  <!-- Google Fonts for Elegant Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #c9a55c;       /* Premium Gold */
      --primary-hover: #b38f4d;
      --bg: #ffffff;
      --surface: #faf9f7;       /* Very subtle warm gray/beige */
      --text: #111111;
      --text-light: #888888;
      --border: #e2dfd8;
      --transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --font-en: 'Montserrat', sans-serif;
      --font-ja: 'Noto Serif JP', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-en);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.8;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Navbar */
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .brand {
      font-family: var(--font-en);
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 6px;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }
    .cart-btn {
      position: relative;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      transition: transform 0.3s ease;
    }
    .cart-btn:hover {
      transform: scale(1.05);
    }
    .cart-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--text);
      color: #fff;
      font-family: var(--font-en);
      font-size: 10px;
      font-weight: 500;
      width: 20px;
      height: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cart-badge.active {
      transform: scale(1);
    }

    /* Hero Section */
    .hero {
      height: 60vh;
      background: url('https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=2069&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 80px;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
    }
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      padding: 0 20px;
    }
    .hero h1 {
      font-family: var(--font-en);
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 12px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .hero p {
      font-family: var(--font-ja);
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 4px;
      opacity: 0.9;
    }

    /* Main Container */
    main {
      padding: 0 40px 120px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-title {
      font-family: var(--font-en);
      font-size: 32px;
      font-weight: 300;
      text-align: center;
      margin-bottom: 80px;
      letter-spacing: 8px;
      position: relative;
      padding-bottom: 24px;
    }
    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: var(--text);
    }

    /* Product Grid - Minimalist approach */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 64px 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      group: product;
      text-decoration: none;
      color: inherit;
    }
    .img-container {
      width: 100%;
      padding-top: 125%; /* 4:5 Aspect Ratio (elegant portrait) */
      position: relative;
      overflow: hidden;
      background: var(--surface);
      margin-bottom: 24px;
    }
    .product-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .product-card:hover .product-img {
      transform: scale(1.08);
    }
    .product-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex-grow: 1;
    }
    .product-category {
      font-family: var(--font-en);
      font-size: 10px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .product-name {
      font-family: var(--font-en);
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: 1px;
      line-height: 1.4;
      flex-grow: 1;
    }
    .product-price {
      font-family: var(--font-en);
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    
    .add-section {
      display: flex;
      gap: 12px;
      width: 100%;
      align-items: center;
    }
    .qty-select {
      font-family: var(--font-en);
      padding: 0 16px;
      height: 48px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      color: var(--text);
      appearance: none;
      border-radius: 0;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 12px;
      padding-right: 32px;
      transition: border-color 0.3s;
    }
    .qty-select:focus {
      border-color: var(--text);
    }
    .add-btn {
      flex: 1;
      height: 48px;
      background: var(--text);
      color: #fff;
      border: 1px solid var(--text);
      font-family: var(--font-ja);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      border-radius: 0;
    }
    .add-btn:hover {
      background: #fff;
      color: var(--text);
    }

    /* Cart Drawer (Glassmorphism & ultra clean) */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      z-index: 90;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: #ffffff;
      z-index: 100;
      box-shadow: -20px 0 60px rgba(0,0,0,0.05);
      transform: translateX(100%);
      transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex;
      flex-direction: column;
    }
    .cart-drawer.active {
      transform: translateX(0);
    }
    .cart-header {
      padding: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .cart-header h2 {
      font-family: var(--font-en);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 4px;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      font-weight: 300;
      cursor: pointer;
      color: var(--text-light);
      transition: color 0.3s, transform 0.3s;
    }
    .close-btn:hover {
      color: var(--text);
      transform: rotate(90deg);
    }
    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 40px;
    }
    .cart-items::-webkit-scrollbar {
      width: 4px;
    }
    .cart-items::-webkit-scrollbar-thumb {
      background: #eee;
    }
    .cart-empty {
      text-align: center;
      padding: 80px 0;
      font-family: var(--font-ja);
      color: var(--text-light);
      font-size: 14px;
      letter-spacing: 1px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--surface);
    }
    .cart-item-img {
      width: 90px;
      height: 112px;
      object-fit: cover;
      background: var(--surface);
    }
    .cart-item-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cart-item-name {
      font-family: var(--font-en);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }
    .cart-item-price {
      font-family: var(--font-en);
      font-size: 14px;
      color: var(--text-light);
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font-en);
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      border-radius: 50%;
    }
    .qty-btn:hover {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }
    .qty-val {
      font-family: var(--font-en);
      font-size: 14px;
      font-weight: 400;
      width: 20px;
      text-align: center;
    }
    .cart-footer {
      padding: 40px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      font-family: var(--font-en);
      font-size: 16px;
      letter-spacing: 2px;
    }
    .checkout-btn {
      width: 100%;
      padding: 20px;
      background: var(--text);
      color: #fff;
      border: 1px solid var(--text);
      font-family: var(--font-ja);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.4s ease;
      text-transform: uppercase;
    }
    .checkout-btn:hover {
      background: #fff;
      color: var(--text);
    }
    .checkout-btn:disabled {
      background: #eee;
      border-color: #eee;
      color: #aaa;
      cursor: not-allowed;
    }

    /* Modals - Clean typography, generous padding */
    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: #fff;
      padding: 60px 48px;
      text-align: center;
      z-index: 110;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 560px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal::-webkit-scrollbar {
      width: 4px;
    }
    .modal.active {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-icon {
      font-size: 40px;
      margin-bottom: 32px;
      line-height: 1;
    }
    .modal h3 {
      font-family: var(--font-ja);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .modal p {
      font-family: var(--font-ja);
      color: var(--text-light);
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 40px;
      line-height: 1.8;
    }
    .modal-btn {
      background: var(--text);
      color: #fff;
      border: 1px solid var(--text);
      padding: 18px 32px;
      font-family: var(--font-ja);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }
    .modal-btn:hover {
      background: #fff;
      color: var(--text);
    }
    .modal-btn-outline {
      background: transparent;
      color: var(--text-light);
      border: none;
      padding: 16px;
      font-family: var(--font-ja);
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      text-decoration: underline;
      transition: color 0.3s;
    }
    .modal-btn-outline:hover {
      color: var(--text);
    }

    /* Confirm List */
    .confirm-list {
      text-align: left;
      margin-bottom: 40px;
      border-top: 1px solid var(--border);
    }
    .confirm-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      font-family: var(--font-en);
      font-size: 14px;
      color: var(--text);
    }
    .confirm-item-name {
      line-height: 1.4;
      padding-right: 16px;
    }
    .confirm-total {
      font-family: var(--font-en);
      font-size: 20px;
      color: var(--text);
      text-align: right;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { height: 50vh; margin-bottom: 60px; }
      .hero h1 { font-size: 32px; letter-spacing: 8px; }
      main { padding: 0 20px 80px; }
      .product-grid { gap: 48px 24px; }
      .cart-drawer { max-width: 100%; }
      .modal { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <a href="#" class="brand">demo</a>
    <button class="cart-btn" onclick="toggleCart()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </header>

  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-content">
      <h1>Salon Quality</h1>
      <p>日常に、美容室の美しさを</p>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    <h2 class="section-title">Collection</h2>
    <div class="product-grid" id="productGrid">
      <!-- Products will be generated here -->
    </div>
  </main>

  <!-- Cart Overlay & Drawer -->
  <div class="overlay" id="overlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>CART</h2>
      <button class="close-btn" onclick="toggleCart()">×</button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
      <!-- Cart items will be generated here -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>TOTAL</span>
        <span id="cartTotalPrice">¥0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="processCheckout()" disabled>
        購入手続きに進む
      </button>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal" id="confirmModal">
    <h3>ご注文の確認</h3>
    <p>以下の内容でご注文を確定いたします。</p>
    <div class="confirm-list" id="confirmList">
      <!-- To be filled by JS -->
    </div>
    <div class="confirm-total" id="confirmTotal"></div>
    <button class="modal-btn" onclick="submitOrder()">注文を確定する</button>
    <button class="modal-btn-outline" onclick="closeConfirmModal()">キャンセルしてメニューに戻る</button>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="successModal">
    <div class="modal-icon">✨</div>
    <h3>Thank You</h3>
    <p>ご注文が完了いたしました。<br>商品の到着まで今しばらくお待ちくださいませ。</p>
    <button class="modal-btn" onclick="closeModal()">ショッピングを続ける</button>
  </div>

  <script>
    // Product Data
    const products = [
      {
        id: 'p1',
        name: 'demo Moisture Shampoo',
        category: 'Shampoo',
        price: 3800,
        image: 'https://images.unsplash.com/photo-1599305090598-fe179d501227?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p2',
        name: 'demo Repair Treatment',
        category: 'Treatment',
        price: 4200,
        image: 'https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p3',
        name: 'Botanical Hair Oil',
        category: 'Hair Care',
        price: 3200,
        image: 'https://images.unsplash.com/photo-1608248593842-8021c6a1faeb?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p4',
        name: 'Organic Scalp Serum',
        category: 'Scalp Care',
        price: 5500,
        image: 'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p5',
        name: 'Natural Styling Wax',
        category: 'Styling',
        price: 2400,
        image: 'https://images.unsplash.com/photo-1596460105822-e2dca9c5ee96?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p6',
        name: 'Premium Hair Mask',
        category: 'Special Care',
        price: 4800,
        image: 'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?q=80&w=800&auto=format&fit=crop'
      }
    ];

    // Cart State
    let cart = [];

    // Initialize
    function init() {
      renderProducts();
      loadCart();
      updateCartUI();
    }

    // Render Products
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="img-container">
            <img src="${p.image}" alt="${p.name}" class="product-img">
          </div>
          <div class="product-info">
            <div class="product-category">${p.category}</div>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-price">¥${p.price.toLocaleString()}</div>
            <div class="add-section">
              <select class="qty-select" id="qty-${p.id}">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
              <button class="add-btn" onclick="addToCart('${p.id}')">カートに入れる</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Add to Cart
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const existingItem = cart.find(item => item.id === productId);
      const selectEl = document.getElementById(`qty-${productId}`);
      const qtyToAdd = selectEl ? parseInt(selectEl.value) : 1;

      if (existingItem) {
        existingItem.quantity += qtyToAdd;
      } else {
        cart.push({ ...product, quantity: qtyToAdd });
      }

      saveCart();
      updateCartUI();
      
      // Reset select
      if (selectEl) selectEl.value = "1";

      // Visual feedback: briefly bounce badge
      const badge = document.getElementById('cartBadge');
      badge.style.transform = 'scale(1.4)';
      setTimeout(() => badge.style.transform = 'scale(1)', 300);
    }

    // Update Quantity
    function updateQty(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (!item) return;

      item.quantity += delta;
      
      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== productId);
      }

      saveCart();
      updateCartUI();
    }

    // Update Cart UI
    function updateCartUI() {
      const container = document.getElementById('cartItemsContainer');
      const totalEl = document.getElementById('cartTotalPrice');
      const badge = document.getElementById('cartBadge');
      const checkoutBtn = document.getElementById('checkoutBtn');

      // Update Badge
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      badge.innerText = totalItems;
      if (totalItems > 0) {
        badge.classList.add('active');
        checkoutBtn.disabled = false;
      } else {
        badge.classList.remove('active');
        checkoutBtn.disabled = true;
      }

      // Calculate Total
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      totalEl.innerText = `¥${totalPrice.toLocaleString()}`;

      // Render Items
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty">カートには何も入っていません。</div>';
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="cart-item-img">
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">¥${item.price.toLocaleString()}</div>
            <div class="cart-item-qty">
              <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
              <span class="qty-val">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Toggle Cart Drawer
    function toggleCart() {
      const drawer = document.getElementById('cartDrawer');
      const overlay = document.getElementById('overlay');
      drawer.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    // Checkout processing mock
    function processCheckout() {
      if (cart.length === 0) return;
      
      // Build confirmation list
      const confirmList = document.getElementById('confirmList');
      confirmList.innerHTML = cart.map(item => `
        <div class="confirm-item">
          <span class="confirm-item-name">${item.name}<br><small style="color: #888;">× ${item.quantity}</small></span>
          <span>¥${(item.price * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');

      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('confirmTotal').innerText = `TOTAL: ¥${totalPrice.toLocaleString()}`;

      // Show Confirm Modal, Hide cart drawer
      const drawer = document.getElementById('cartDrawer');
      drawer.classList.remove('active');
      document.getElementById('confirmModal').classList.add('active');
      document.getElementById('overlay').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('active');
      // show cart drawer back
      document.getElementById('cartDrawer').classList.add('active');
    }

    function submitOrder() {
      const btn = document.querySelector('#confirmModal .modal-btn');
      const originalText = btn.innerText;
      btn.innerText = 'ご注文を処理しています...';
      btn.disabled = true;

      setTimeout(() => {
        // Clear cart
        cart = [];
        saveCart();
        updateCartUI();
        
        // Hide confirm modal, show success modal
        document.getElementById('confirmModal').classList.remove('active');
        document.getElementById('successModal').classList.add('active');

        // Restore button state
        btn.innerText = originalText;
        btn.disabled = false;
      }, 1500);
    }

    function closeModal() {
      document.getElementById('successModal').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }

    // Local Storage Utilities
    function saveCart() {
      localStorage.setItem('lumiere_cart', JSON.stringify(cart));
    }

    function loadCart() {
      const saved = localStorage.getItem('lumiere_cart');
      if (saved) {
        try {
          cart = JSON.parse(saved);
        } catch(e) {
          cart = [];
        }
      }
    }

    // Run
    init();
  </script>
</body>
</html>
